<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found | LC Travels</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald-deep:#0b3d2e;
    --emerald:#0f5c46;
    --rose-gold:#e0a899;
    --rose-gold-bright:#f4c2b3;
    --gold-shine:#f7d9c4;
    --cream:#fdf7f2;
    --ink:#0a2419;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Poppins',sans-serif;color:var(--cream);
    background:
      radial-gradient(circle at 20% 30%,rgba(224,168,153,.18),transparent 55%),
      radial-gradient(circle at 80% 70%,rgba(247,217,196,.12),transparent 55%),
      linear-gradient(135deg,var(--emerald-deep) 0%,var(--emerald) 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:40px 20px;text-align:center;overflow:hidden;
  }
  .wrap{max-width:640px;position:relative;z-index:2}
  .kicker{
    display:inline-block;padding:8px 20px;border:1px solid var(--rose-gold);
    border-radius:100px;font-size:.75rem;letter-spacing:4px;text-transform:uppercase;
    color:var(--rose-gold-bright);margin-bottom:24px;background:rgba(224,168,153,.08);
  }
  .four{
    font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(6rem,18vw,12rem);
    line-height:1;letter-spacing:-6px;
    background:linear-gradient(135deg,var(--rose-gold-bright),var(--gold-shine),var(--rose-gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 20px 60px rgba(224,168,153,.2);
  }
  h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);margin:14px 0 12px;font-weight:800}
  h1 em{
    font-style:italic;
    background:linear-gradient(135deg,var(--rose-gold-bright),var(--gold-shine));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  p{opacity:.9;font-weight:300;margin-bottom:30px;max-width:480px;margin-left:auto;margin-right:auto}
  .btn{
    display:inline-block;padding:16px 42px;font-weight:500;font-size:.95rem;
    letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;
    border-radius:100px;color:var(--emerald-deep);
    background:linear-gradient(135deg,var(--rose-gold-bright) 0%,var(--gold-shine) 50%,var(--rose-gold) 100%);
    box-shadow:0 10px 30px rgba(224,168,153,.4),inset 0 1px 0 rgba(255,255,255,.5);
    position:relative;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease;
  }
  .btn::before{
    content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
    transition:left .7s ease;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(224,168,153,.55)}
  .btn:hover::before{left:100%}
</style>
</head>
<body>
  <div class="wrap">
    <span class="kicker">Detour Ahead</span>
    <div class="four">404</div>
    <h1>This trip <em>doesn't exist</em></h1>
    <p>The page you're looking for might have taken off without us. Let's get you back on the right journey.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
